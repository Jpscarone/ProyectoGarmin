<input name="planned_session_id" type="hidden" value="{{ planned_session.id }}">

<label class="field">
    <span>Orden</span>
    <input name="step_order" type="number" min="1" value="{{ step.step_order if step else '1' }}" required>
</label>

<label class="field">
    <span>Tipo de paso</span>
    <select name="step_type" required>
        {% set current_step_type = step.step_type if step else '' %}
        {% for option in step_type_options %}
        <option value="{{ option.value }}" {% if current_step_type == option.value %}selected{% endif %}>{{ option.label }}</option>
        {% endfor %}
    </select>
</label>

<label class="field">
    <span>Repeticiones</span>
    <input name="repeat_count" type="number" min="1" value="{{ step.repeat_count if step and step.repeat_count is not none else '' }}" placeholder="Ej: 4">
</label>

<label class="field">
    <span>Duracion</span>
    <input name="duration_hhmm" type="text" value="{{ duration_seconds_hhmm(step.duration_sec) if step else '' }}" placeholder="Ej: 0:45">
</label>

<div class="field distance-field">
    <span>Distancia</span>
    <div class="inline-fields">
        <input name="distance_value" type="number" min="0" step="0.1" value="{{ distance_form_value(step.distance_m) if step else '' }}" placeholder="Ej: 1000">
        <select name="distance_unit">
            {% set current_distance_unit = distance_form_unit(step.distance_m) if step else 'km' %}
            <option value="m" {% if current_distance_unit == 'm' %}selected{% endif %}>m</option>
            <option value="km" {% if current_distance_unit == 'km' %}selected{% endif %}>km</option>
        </select>
    </div>
</div>

<label class="field">
    <span>Criterio de intensidad</span>
    {% set current_step_target_type = step.target_type if step and step.target_type else ('power' if step and (step.target_power_zone or step.target_power_min or step.target_power_max) else 'pace' if step and (step.target_pace_zone or step.target_pace_min_sec_km or step.target_pace_max_sec_km) else 'hr' if step and (step.target_hr_zone or step.target_hr_min or step.target_hr_max) else 'rpe' if step and step.target_rpe_zone else '') %}
    <select name="target_type" id="step-target-type">
        <option value="">Sin criterio</option>
        {% for option in intensity_target_options %}
        <option value="{{ option.value }}" {% if current_step_target_type == option.value %}selected{% endif %}>{{ option.label }}</option>
        {% endfor %}
    </select>
</label>

<label class="field intensity-target-group" data-target-scope="step" data-target-type="hr">
    <span>Zona FC objetivo</span>
    <select name="target_hr_zone">
        <option value="">Sin zona</option>
        {% set current_step_hr_zone = step.target_hr_zone if step and step.target_hr_zone else '' %}
        {% for option in zone_options %}
        <option value="{{ option.value }}" {% if current_step_hr_zone == option.value %}selected{% endif %}>{{ option.label }}</option>
        {% endfor %}
    </select>
</label>

<label class="field intensity-target-group" data-target-scope="step" data-target-type="pace">
    <span>Zona de ritmo objetivo</span>
    <select name="target_pace_zone">
        <option value="">Sin zona</option>
        {% set current_step_pace_zone = step.target_pace_zone if step and step.target_pace_zone else '' %}
        {% for option in zone_options %}
        <option value="{{ option.value }}" {% if current_step_pace_zone == option.value %}selected{% endif %}>{{ option.label }}</option>
        {% endfor %}
    </select>
</label>

<label class="field intensity-target-group" data-target-scope="step" data-target-type="power">
    <span>Zona potencia objetivo</span>
    <select name="target_power_zone">
        <option value="">Sin zona</option>
        {% set current_step_power_zone = step.target_power_zone if step and step.target_power_zone else '' %}
        {% for option in zone_options %}
        <option value="{{ option.value }}" {% if current_step_power_zone == option.value %}selected{% endif %}>{{ option.label }}</option>
        {% endfor %}
    </select>
</label>

<label class="field intensity-target-group" data-target-scope="step" data-target-type="rpe">
    <span>Zona de esfuerzo percibido</span>
    <select name="target_rpe_zone">
        <option value="">Sin zona</option>
        {% set current_step_rpe_zone = step.target_rpe_zone if step and step.target_rpe_zone else '' %}
        {% for option in rpe_zone_options %}
        <option value="{{ option.value }}" {% if current_step_rpe_zone == option.value %}selected{% endif %}>{{ option.label }}</option>
        {% endfor %}
    </select>
</label>

<label class="field">
    <span>Cadencia min</span>
    <input name="target_cadence_min" type="number" min="1" value="{{ step.target_cadence_min if step and step.target_cadence_min is not none else '' }}" placeholder="Ej: 85">
</label>

<label class="field">
    <span>Cadencia max</span>
    <input name="target_cadence_max" type="number" min="1" value="{{ step.target_cadence_max if step and step.target_cadence_max is not none else '' }}" placeholder="Ej: 95">
</label>

<label class="field field-full">
    <span>Notas</span>
    <textarea name="target_notes" rows="4" placeholder="Ej: suave, fuerte, tecnica o referencia del bloque">{{ step.target_notes if step and step.target_notes else '' }}</textarea>
</label>
