{% extends "base.html" %}

{% block title %}Nuevo paso | training_app{% endblock %}

{% block content %}
<section class="panel">
    <div class="section-heading">
        <div>
            <p class="eyebrow">Pasos</p>
            <h1>Agregar paso</h1>
            <p class="text-muted">Sesion: {{ planned_session.name }}</p>
        </div>
        <a class="button button-secondary" href="/planned_sessions/{{ planned_session.id }}">Volver a la sesion</a>
    </div>

    <form id="step-form" class="form-grid">
        {% include "planned_session_steps/partials/form_fields.html" %}
        <div class="form-actions">
            <button class="button" type="submit">Guardar paso</button>
        </div>
    </form>
</section>

<script>
document.getElementById("step-form").addEventListener("submit", async (event) => {
    event.preventDefault();
    const payload = serializeForm(event.currentTarget);

    const response = await fetch("/planned_session_steps", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(payload)
    });

    if (!response.ok) {
        const error = await safeError(response);
        window.alert(error);
        return;
    }

    window.location.href = "/planned_sessions/{{ planned_session.id }}";
});

function serializeForm(form) {
    const formData = new FormData(form);
    const payload = {
        planned_session_id: formData.get("planned_session_id"),
        step_order: emptyToNull(formData.get("step_order")),
        step_type: formData.get("step_type"),
        repeat_count: emptyToNull(formData.get("repeat_count")),
        duration_sec: hhmmToSeconds(formData.get("duration_hhmm")),
        distance_m: distanceToMeters(formData.get("distance_value"), formData.get("distance_unit")),
        target_hr_min: emptyToNull(formData.get("target_hr_min")),
        target_hr_max: emptyToNull(formData.get("target_hr_max")),
        target_power_min: emptyToNull(formData.get("target_power_min")),
        target_power_max: emptyToNull(formData.get("target_power_max")),
        target_pace_min_sec_km: paceToSeconds(formData.get("target_pace_min_formatted")),
        target_pace_max_sec_km: paceToSeconds(formData.get("target_pace_max_formatted")),
        target_cadence_min: emptyToNull(formData.get("target_cadence_min")),
        target_cadence_max: emptyToNull(formData.get("target_cadence_max")),
        target_notes: emptyToNull(formData.get("target_notes")),
    };
    return payload;
}

function emptyToNull(value) {
    return value === "" || value === null ? null : value;
}

function normalizeDurationInputValue(rawValue) {
    const value = String(rawValue || "").trim().toLowerCase().replace(/\s+/g, "");
    if (!value) return "";

    let totalMinutes = null;
    const hhmm = value.match(/^(\d+):(\d{1,2})$/);
    if (hhmm) {
        const hours = Number(hhmm[1]);
        const minutes = Number(hhmm[2]);
        if (!Number.isNaN(hours) && !Number.isNaN(minutes) && minutes <= 59) {
            totalMinutes = hours * 60 + minutes;
        }
    }
    if (totalMinutes === null) {
        const compactHours = value.match(/^(\d+)h(\d{1,2})$/);
        if (compactHours) {
            const hours = Number(compactHours[1]);
            const minutes = Number(compactHours[2]);
            if (!Number.isNaN(hours) && !Number.isNaN(minutes) && minutes <= 59) {
                totalMinutes = hours * 60 + minutes;
            }
        }
    }
    if (totalMinutes === null) {
        const onlyHours = value.match(/^(\d+)h(?:s)?$/);
        if (onlyHours) totalMinutes = Number(onlyHours[1]) * 60;
    }
    if (totalMinutes === null) {
        const onlyMinutes = value.match(/^(\d+)(?:min|m)?$/);
        if (onlyMinutes) totalMinutes = Number(onlyMinutes[1]);
    }
    if (totalMinutes === null || Number.isNaN(totalMinutes) || totalMinutes < 0) return "";
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;
    return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
}

function hhmmToSeconds(value) {
    const normalized = normalizeDurationInputValue(value);
    if (!normalized) return null;
    const match = normalized.match(/^(\d+):([0-5]\d)$/);
    if (!match) return null;
    return (Number(match[1]) * 60 + Number(match[2])) * 60;
}

function paceToSeconds(value) {
    if (!value) return null;
    const match = String(value).trim().match(/^(\d+):([0-5]\d)$/);
    if (!match) return null;
    return Number(match[1]) * 60 + Number(match[2]);
}

function distanceToMeters(value, unit) {
    if (!value) return null;
    const numeric = Number(value);
    if (Number.isNaN(numeric)) return null;
    return unit === "km" ? Math.round(numeric * 1000) : Math.round(numeric);
}

async function safeError(response) {
    try {
        const data = await response.json();
        return data.detail || "No se pudo guardar el paso.";
    } catch {
        return "No se pudo guardar el paso.";
    }
}

const durationField = document.querySelector('[name="duration_hhmm"]');
if (durationField) {
    durationField.addEventListener("blur", () => {
        if (!durationField.value.trim()) return;
        const normalized = normalizeDurationInputValue(durationField.value);
        if (!normalized) {
            durationField.value = "";
            durationField.focus();
            return;
        }
        durationField.value = normalized;
    });
}

const distanceField = document.querySelector('[name="distance_value"]');
if (distanceField) {
    distanceField.addEventListener("blur", () => {
        const raw = String(distanceField.value || "").trim();
        if (!raw) return;
        const normalized = raw.replace(",", ".");
        const numeric = Number(normalized);
        if (Number.isNaN(numeric) || numeric < 0) {
            distanceField.value = "";
            distanceField.focus();
            return;
        }
        distanceField.value = normalized;
    });
}
</script>
{% endblock %}
