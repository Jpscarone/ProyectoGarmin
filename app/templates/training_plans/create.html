{% extends "base.html" %}

{% block title %}Nuevo plan | training_app{% endblock %}

{% block content %}
<section class="panel">
    <div class="section-heading">
        <div>
            <p class="eyebrow">Planes</p>
            <h1>Crear plan</h1>
        </div>
        <a class="button button-secondary" href="/training_plans">Volver</a>
    </div>

    <form id="training-plan-form" class="form-grid">
        {% include "training_plans/partials/form_fields.html" %}
        <div class="form-actions">
            <button class="button" type="submit">Guardar plan</button>
        </div>
    </form>
</section>

<script>
const secondaryGoalTemplate = document.getElementById("secondary-goal-template");
const secondaryGoalsList = document.getElementById("secondary-goals-list");

function addSecondaryGoal() {
    secondaryGoalsList.appendChild(secondaryGoalTemplate.content.firstElementChild.cloneNode(true));
}

function removeSecondaryGoal(button) {
    button.closest("[data-secondary-goal]").remove();
}

document.getElementById("training-plan-form").addEventListener("submit", async (event) => {
    event.preventDefault();
    const payload = serializeForm(event.currentTarget);

    const response = await fetch("/training_plans", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(payload)
    });

    if (!response.ok) {
        const error = await safeError(response);
        window.alert(error);
        return;
    }

    const created = await response.json();
    window.location.href = `/training_plans/${created.id}`;
});

function serializeForm(form) {
    const formData = new FormData(form);
    const payload = {};
    for (const [key, value] of formData.entries()) {
        payload[key] = value === "" ? null : value;
    }
    payload.primary_goal = serializePrimaryGoal(form);
    payload.secondary_goals = serializeSecondaryGoals();
    return payload;
}

function serializePrimaryGoal(form) {
    return {
        id: emptyToNull(form.querySelector('[name="primary_goal_id"]').value),
        name: emptyToNull(form.querySelector('[name="primary_goal_name"]').value),
        sport_type: emptyToNull(form.querySelector('[name="primary_goal_sport_type"]').value),
        event_date: emptyToNull(form.querySelector('[name="primary_goal_event_date"]').value),
        distance_km: floatOrNull(form.querySelector('[name="primary_goal_distance_km"]').value),
        elevation_gain_m: floatOrNull(form.querySelector('[name="primary_goal_elevation_gain_m"]').value),
        location_name: emptyToNull(form.querySelector('[name="primary_goal_location_name"]').value),
        priority: emptyToNull(form.querySelector('[name="primary_goal_priority"]').value),
        notes: emptyToNull(form.querySelector('[name="primary_goal_notes"]').value),
    };
}

function serializeSecondaryGoals() {
    return Array.from(document.querySelectorAll("[data-secondary-goal]")).map((card) => ({
        id: emptyToNull(card.querySelector('[data-goal-field="id"]').value),
        name: emptyToNull(card.querySelector('[data-goal-field="name"]').value),
        sport_type: emptyToNull(card.querySelector('[data-goal-field="sport_type"]').value),
        event_date: emptyToNull(card.querySelector('[data-goal-field="event_date"]').value),
        distance_km: floatOrNull(card.querySelector('[data-goal-field="distance_km"]').value),
        elevation_gain_m: floatOrNull(card.querySelector('[data-goal-field="elevation_gain_m"]').value),
        location_name: emptyToNull(card.querySelector('[data-goal-field="location_name"]').value),
        priority: emptyToNull(card.querySelector('[data-goal-field="priority"]').value),
        notes: emptyToNull(card.querySelector('[data-goal-field="notes"]').value),
    }));
}

function emptyToNull(value) {
    return value === "" ? null : value;
}

function floatOrNull(value) {
    return value === "" ? null : Number(value);
}

async function safeError(response) {
    try {
        const data = await response.json();
        return data.detail || "No se pudo guardar el plan.";
    } catch {
        return "No se pudo guardar el plan.";
    }
}
</script>
{% endblock %}
