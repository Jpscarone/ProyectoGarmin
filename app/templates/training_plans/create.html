{% extends "base.html" %}

{% block title %}Nuevo plan | training_app{% endblock %}

{% block content %}
<section class="panel">
    <div class="section-heading">
        <div>
            <p class="eyebrow">Planes</p>
            <h1>Crear plan</h1>
        </div>
        <a class="button button-secondary" href="/training_plans">Volver</a>
    </div>

    <form id="training-plan-form" class="form-grid">
        {% include "training_plans/partials/form_fields.html" %}
        <div class="form-actions">
            <button class="button" type="submit">Guardar plan</button>
        </div>
    </form>
</section>

<script>
document.getElementById("training-plan-form").addEventListener("submit", async (event) => {
    event.preventDefault();
    const payload = serializeForm(event.currentTarget);

    const response = await fetch("/training_plans", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(payload)
    });

    if (!response.ok) {
        const error = await safeError(response);
        window.alert(error);
        return;
    }

    window.location.href = "/training_plans";
});

function serializeForm(form) {
    const formData = new FormData(form);
    const payload = {};
    for (const [key, value] of formData.entries()) {
        payload[key] = value === "" ? null : value;
    }
    return payload;
}

async function safeError(response) {
    try {
        const data = await response.json();
        return data.detail || "No se pudo guardar el plan.";
    } catch {
        return "No se pudo guardar el plan.";
    }
}
</script>
{% endblock %}
