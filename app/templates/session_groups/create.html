{% extends "base.html" %}

{% block title %}Nuevo grupo | training_app{% endblock %}

{% block content %}
<section class="panel">
    <div class="section-heading">
        <div>
            <p class="eyebrow">Grupos</p>
            <h1>Crear grupo de sesiones</h1>
            <p class="text-muted">Dia: {{ training_day.day_date }}</p>
        </div>
        <a class="button button-secondary" href="/training_days/{{ training_day.id }}">Volver al dia</a>
    </div>

    <form id="session-group-form" class="form-grid">
        {% include "session_groups/partials/form_fields.html" %}
        <div class="form-actions">
            <button class="button" type="submit">Guardar grupo</button>
        </div>
    </form>
</section>

<script>
document.getElementById("session-group-form").addEventListener("submit", async (event) => {
    event.preventDefault();
    const payload = serializeForm(event.currentTarget);

    const response = await fetch("/session_groups", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(payload)
    });

    if (!response.ok) {
        const error = await safeError(response);
        window.alert(error);
        return;
    }

    window.location.href = "/training_days/{{ training_day.id }}";
});

function serializeForm(form) {
    const formData = new FormData(form);
    const payload = {};
    for (const [key, value] of formData.entries()) {
        payload[key] = value === "" ? null : value;
    }
    return payload;
}

async function safeError(response) {
    try {
        const data = await response.json();
        return data.detail || "No se pudo guardar el grupo.";
    } catch {
        return "No se pudo guardar el grupo.";
    }
}
</script>
{% endblock %}
